<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gio's Calendar</title>
<style>
  :root {
    --bg: #efe9dc;
    --panel: #faf5ea;
    --panel2: #f1ead9;
    --border: #ddd3bd;
    --text: #3a3428;
    --muted: #7d7260;
    --accent: #9a4a1b;
    --school-bg: #f3dcc8; --school-tx: #7d3a10;
    --work-bg: #dcebd1;   --work-tx: #2e5e2a;
    --personal-bg: #e8ddf0; --personal-tx: #5b3a82;
    --today-bg: #fdeecd;  --today-badge: #c97f1b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    height: 100vh; overflow: hidden; padding: 14px;
    display: flex; flex-direction: column;
  }
  .layout { display: flex; gap: 16px; flex: 1; min-height: 0; }
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .sidebar {
    width: 290px; flex-shrink: 0; overflow-y: auto; padding-right: 2px; scrollbar-width: thin;
    display: flex; flex-direction: column;
  }
  .sidebar > :first-child { margin-top: auto; }
  .sidebar > :last-child { margin-bottom: auto; }

  header { display: grid; grid-template-columns: repeat(7, 1fr); align-items: center; margin-bottom: 12px; }
  header h1 { grid-column: 2; grid-row: 1; justify-self: center; white-space: nowrap; }
  header .nav { grid-column: 1 / -1; grid-row: 1; justify-self: center; }
  h1 { font-size: 1.45rem; font-weight: 650; color: #3a3428; }
  .nav { display: flex; align-items: center; gap: 8px; }
  .nav button {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 0.95rem;
    box-shadow: 0 1px 2px rgba(20,30,50,.05);
  }
  .nav button:hover { background: var(--panel2); }
  #monthLabel { font-size: 1.12rem; font-weight: 650; min-width: 175px; text-align: center; }

  .grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    grid-template-rows: auto repeat(6, 1fr);
    flex: 1; min-height: 0;
    background: #c2a479; gap: 1px;
    border: 2px solid #a3835a; border-radius: 12px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(90,70,40,.12);
  }
  .dow, .day { min-width: 0; }
  .dow {
    background: var(--panel2); padding: 9px 0; text-align: center;
    font-size: 0.74rem; font-weight: 650; color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
  }
  .day {
    background: var(--panel); padding: 5px 6px; overflow: hidden;
    cursor: pointer; transition: background .12s;
  }
  .day:hover { background: #f4eedf; }
  .day.other { background: #f3eee0; }
  .day.other .num { color: #c9bda5; }
  .day.today { background: var(--today-bg); }
  .day .num { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
  .day.today .num {
    background: var(--today-badge); color: #fff; font-weight: 700;
    display: inline-block; padding: 1px 7px; border-radius: 10px;
  }
  .evt {
    font-size: 0.72rem; border-radius: 5px; padding: 2px 6px; margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-weight: 600; cursor: pointer;
  }
  .evt.school { background: var(--school-bg); color: var(--school-tx); }
  .evt.work { background: var(--work-bg); color: var(--work-tx); }
  .evt.personal { background: var(--personal-bg); color: var(--personal-tx); }
  .evt.holiday { background: #f3e2b3; color: #7c5a0d; font-style: italic; cursor: default; }
  .more { font-size: 0.7rem; color: var(--muted); padding-left: 2px; }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(20,30,50,.05);
  }
  .card h2 { font-size: 0.92rem; margin-bottom: 10px; color: var(--text); font-weight: 650; }
  .up-item { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--panel2); font-size: 0.85rem; }
  .up-item:last-child { border-bottom: none; }
  .up-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .up-date { color: var(--muted); font-size: 0.75rem; }
  .tag {
    display: inline-block; font-size: 0.65rem; font-weight: 700; border-radius: 5px;
    padding: 1px 6px; margin-right: 6px; vertical-align: 1px;
  }
  .tag.tech { background: var(--school-bg); color: var(--school-tx); }
  .tag.outdoors { background: var(--work-bg); color: var(--work-tx); }
  #syncInfo { font-size: 0.75rem; color: var(--muted); }

  /* airport-style tickers */
  .tickers {
    margin: 14px auto 0; width: min(82%, 1280px); align-self: center;
    display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
  }
  .ticker-row {
    display: flex; align-items: stretch; height: 50px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; box-shadow: 0 1px 4px rgba(60,50,30,.06);
  }
  .ticker-label {
    flex-shrink: 0; display: flex; align-items: center; padding: 0 18px;
    font-size: 0.85rem; font-weight: 700; letter-spacing: .06em; color: var(--muted);
    background: var(--panel2); border-right: 1px solid var(--border); white-space: nowrap;
  }
  .ticker-view { flex: 1; overflow: hidden; position: relative; }
  .ticker-track {
    display: inline-flex; align-items: center; height: 100%; white-space: nowrap;
    animation: tickerMove 60s linear infinite; will-change: transform;
  }
  .ticker-view:hover .ticker-track { animation-play-state: paused; }
  @keyframes tickerMove { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .t-item { font-size: 0.98rem; padding: 0 22px; color: var(--text); }
  .t-item .tick { color: var(--accent); font-weight: 700; }
  .t-item a { color: var(--accent); font-weight: 650; text-decoration: none; }
  .t-item a:hover { text-decoration: underline; }
  .t-item .dim { color: var(--muted); }
  .t-sep { color: #c9b98f; font-size: 0.8rem; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(40,48,60,.45); align-items: center; justify-content: center; z-index: 10; }
  .overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 22px; width: 360px; max-width: 92vw; box-shadow: 0 8px 30px rgba(20,30,50,.18); }
  .modal h3 { margin-bottom: 14px; font-size: 1.05rem; }
  .modal label { display: block; font-size: 0.78rem; color: var(--muted); margin: 10px 0 4px; }
  .modal input, .modal select, .modal textarea {
    width: 100%; background: #fffdf7; border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 8px 10px; font-size: 0.9rem;
  }
  .modal .row { display: flex; gap: 10px; }
  .modal .row > div { flex: 1; }
  .actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
  .actions button { border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
  .btn-save { background: var(--accent); color: #fff; }
  .btn-cancel { background: var(--panel2); color: var(--text); border: 1px solid var(--border) !important; }
  .btn-del { background: #d9534f; color: #fff; margin-right: auto; }
  .src-tag { display: inline-block; font-size: 0.7rem; background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; color: var(--muted); margin-bottom: 8px; }
  #loadStatus {
    position: fixed; top: 10px; right: 14px; font-size: 0.75rem; color: var(--muted);
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px;
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  #loadStatus.show { opacity: 1; }
  @media (max-width: 980px) {
    body { height: auto; overflow: auto; }
    .layout { flex-direction: column; height: auto; }
    .sidebar { width: 100%; overflow: visible; }
    .day { min-height: 100px; }
    header { display: flex; flex-direction: column; gap: 8px; }
    .tickers { width: 100%; }
  }
</style>
</head>
<body>

<div id="loadStatus">Loading…</div>

<div class="layout">
  <div class="main">
    <header>
      <h1>Gio's Calendar</h1>
      <div class="nav">
        <button id="prevBtn">‹</button>
        <div id="monthLabel"></div>
        <button id="nextBtn">›</button>
        <button id="todayBtn">Today</button>
      </div>
    </header>
    <div class="grid" id="grid"></div>
  </div>

  <div class="sidebar">
    <div class="card">
      <h2>⏰ Upcoming (next 14 days)</h2>
      <div id="upcoming"></div>
    </div>
    <div class="card">
      <h2>🔄 Auto-sync</h2>
      <div id="syncInfo"></div>
    </div>
  </div>
</div>

<div class="tickers">
  <div class="ticker-row">
    <div class="ticker-label">📈 STOCKS</div>
    <div class="ticker-view"><div class="ticker-track" id="stockTicker"></div></div>
  </div>
  <div class="ticker-row">
    <div class="ticker-label">🌄 NOOGA</div>
    <div class="ticker-view"><div class="ticker-track" id="newsTicker"></div></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">Add event</h3>
    <div id="srcTag"></div>
    <label>Title</label>
    <input id="fTitle" placeholder="e.g. Essay due, Shift, Dentist">
    <div class="row">
      <div><label>Date</label><input id="fDate" type="date"></div>
      <div><label>Time (optional)</label><input id="fTime" type="time"></div>
    </div>
    <label>Category</label>
    <select id="fCat">
      <option value="personal">Personal</option>
      <option value="school">School</option>
      <option value="work">Work</option>
    </select>
    <label>Notes (optional)</label>
    <textarea id="fNotes" rows="2"></textarea>
    <div class="actions">
      <button class="btn-del" id="delBtn" style="display:none">Delete</button>
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-save" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script>
(() => {
  // ---- Supabase (cloud storage so every device sees the same calendar) ----
  const SB_URL = "https://hqcswdzbydrhqrmcaoru.supabase.co";
  const SB_KEY = "sb_publishable_EwyKiBl8cy6KkQ-bN_eEZA_xFQR_ULw"; // public browser key
  const HEADERS = { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": "application/json" };
  const sb = (path, opts = {}) =>
    fetch(SB_URL + "/rest/v1/" + path, { ...opts, headers: { ...HEADERS, ...(opts.headers || {}) } });

  const HOLIDAYS = {
    "2026-01-01":"New Year's Day","2026-01-19":"MLK Day","2026-02-14":"Valentine's Day",
    "2026-02-16":"Presidents' Day","2026-03-17":"St. Patrick's Day","2026-04-05":"Easter",
    "2026-05-10":"Mother's Day","2026-05-25":"Memorial Day","2026-06-19":"Juneteenth",
    "2026-06-21":"Father's Day","2026-07-04":"Independence Day","2026-09-07":"Labor Day",
    "2026-10-31":"Halloween","2026-11-11":"Veterans Day","2026-11-26":"Thanksgiving",
    "2026-12-24":"Christmas Eve","2026-12-25":"Christmas","2026-12-31":"New Year's Eve",
    "2027-01-01":"New Year's Day","2027-01-18":"MLK Day","2027-02-14":"Valentine's Day",
    "2027-02-15":"Presidents' Day","2027-03-17":"St. Patrick's Day","2027-03-28":"Easter",
    "2027-05-09":"Mother's Day","2027-05-31":"Memorial Day","2027-06-19":"Juneteenth",
    "2027-06-20":"Father's Day","2027-07-04":"Independence Day","2027-09-06":"Labor Day",
    "2027-10-31":"Halloween","2027-11-11":"Veterans Day","2027-11-25":"Thanksgiving",
    "2027-12-24":"Christmas Eve","2027-12-25":"Christmas","2027-12-31":"New Year's Eve"
  };

  let events = [];
  let briefing = { updated: null, stocks: [], news: [] };
  let view = new Date();
  view.setDate(1);
  let editingId = null;

  const pad = n => String(n).padStart(2, "0");
  const dkey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const status = (msg, keep) => {
    const el = document.getElementById("loadStatus");
    el.textContent = msg; el.classList.add("show");
    if (!keep) setTimeout(() => el.classList.remove("show"), 2000);
  };

  const isSynced = e => e.source === "D2L" || e.source === "Teamworx";
  const eventsOn = key => events.filter(e => e.date === key)
      .sort((a,b) => (a.time || "99") < (b.time || "99") ? -1 : 1);

  function fmtTime(t) {
    if (!t) return "";
    const [h, m] = t.split(":").map(Number);
    return `${((h + 11) % 12) + 1}${m ? ":" + pad(m) : ""}${h >= 12 ? "p" : "a"} `;
  }

  async function load() {
    status("Loading…", true);
    try {
      const [ev, br] = await Promise.all([
        sb("events?select=*").then(r => r.json()),
        sb("briefing?id=eq.1&select=*").then(r => r.json())
      ]);
      events = Array.isArray(ev) ? ev : [];
      if (Array.isArray(br) && br[0]) briefing = br[0];
      status("Up to date");
    } catch (e) {
      status("Offline — couldn't reach the calendar database", true);
    }
    render();
  }

  function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d => {
      const el = document.createElement("div");
      el.className = "dow"; el.textContent = d;
      grid.appendChild(el);
    });

    const todayKey = dkey(new Date()); // recomputed so wall displays roll over at midnight
    const y = view.getFullYear(), m = view.getMonth();
    document.getElementById("monthLabel").textContent =
      view.toLocaleString("en-US", { month: "long", year: "numeric" });

    const firstDow = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const rows = Math.ceil((firstDow + daysInMonth) / 7);
    grid.style.gridTemplateRows = `auto repeat(${rows}, 1fr)`;
    const start = new Date(y, m, 1);
    start.setDate(1 - start.getDay());
    for (let i = 0; i < rows * 7; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      const key = dkey(d);
      const cell = document.createElement("div");
      cell.className = "day" + (d.getMonth() !== m ? " other" : "") + (key === todayKey ? " today" : "");
      const num = document.createElement("div");
      num.className = "num"; num.textContent = d.getDate();
      cell.appendChild(num);

      if (HOLIDAYS[key]) {
        const hd = document.createElement("div");
        hd.className = "evt holiday";
        hd.textContent = "🎉 " + HOLIDAYS[key];
        hd.title = HOLIDAYS[key];
        hd.onclick = ev => ev.stopPropagation();
        cell.appendChild(hd);
      }

      const evts = eventsOn(key);
      evts.slice(0, 3).forEach(e => {
        const el = document.createElement("div");
        el.className = "evt " + (e.category || "personal");
        el.textContent = fmtTime(e.time) + e.title;
        el.title = e.title + (e.notes ? " — " + e.notes : "");
        el.onclick = ev => { ev.stopPropagation(); openModal(key, e); };
        cell.appendChild(el);
      });
      if (evts.length > 3) {
        const more = document.createElement("div");
        more.className = "more"; more.textContent = `+${evts.length - 3} more`;
        cell.appendChild(more);
      }
      cell.onclick = () => openModal(key, null);
      grid.appendChild(cell);
    }
    renderUpcoming();
    renderBriefing();
    renderSync();
  }

  function renderUpcoming() {
    const box = document.getElementById("upcoming");
    const now = new Date(); now.setHours(0,0,0,0);
    const end = new Date(now); end.setDate(end.getDate() + 14);
    const list = events
      .filter(e => { const d = new Date(e.date + "T00:00"); return d >= now && d <= end; })
      .sort((a,b) => (a.date + (a.time||"")) < (b.date + (b.time||"")) ? -1 : 1);
    box.innerHTML = list.length ? "" : '<div class="up-date">Nothing in the next two weeks 🎉</div>';
    const colors = {school: "var(--school-tx)", work: "var(--work-tx)", personal: "var(--personal-tx)"};
    list.slice(0, 10).forEach(e => {
      const d = new Date(e.date + "T00:00");
      const item = document.createElement("div");
      item.className = "up-item";
      item.innerHTML = `<div class="up-dot" style="background:${colors[e.category] || colors.personal}"></div>
        <div><div>${e.title}</div>
        <div class="up-date">${d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}${e.time ? " · " + fmtTime(e.time) : ""}</div></div>`;
      box.appendChild(item);
    });
  }

  function renderBriefing() {
    const sep = '<span class="t-sep">◆</span>';
    const fillTicker = (id, items) => {
      const track = document.getElementById(id);
      if (!items.length) { track.innerHTML = '<span class="t-item dim">No data yet — fills in each morning.</span>'; return; }
      const half = items.join(sep) + sep;
      track.innerHTML = half + half;
      const secs = Math.max(40, Math.min(160, Math.round(track.textContent.length / 2 * 0.13)));
      track.style.animationDuration = secs + "s";
    };

    const sItems = (briefing.stocks || []).map(s =>
      `<span class="t-item"><span class="tick">${s.ticker}</span> ${s.name || ""} <span class="dim">— ${s.note || ""}</span></span>`);
    if (sItems.length) sItems.push(`<span class="t-item dim">Updated ${briefing.updated || ""} · From Reddit/X + Yahoo/Google news · Info only, not financial advice</span>`);
    fillTicker("stockTicker", sItems);

    const nItems = (briefing.news || []).map(n => {
      const tag = `<span class="tag ${(n.tag || 'tech').toLowerCase()}">${n.tag || ''}</span>`;
      return `<span class="t-item">${tag}<a href="${n.link || '#'}" target="_blank" rel="noopener">${n.title}</a> <span class="dim">— ${n.summary || ""}</span></span>`;
    });
    fillTicker("newsTicker", nItems);
  }

  function renderSync() {
    const el = document.getElementById("syncInfo");
    const n = events.filter(isSynced).length;
    el.innerHTML = `<b>${events.length}</b> events (${n} auto-synced from D2L/Teamworx). ` +
      `Cloud-synced — changes show up on all your devices. Nightly D2L check ~9 PM; stocks &amp; news refresh weekday mornings.`;
  }

  // ---- modal ----
  const overlay = document.getElementById("overlay");
  function openModal(dateKey, evt) {
    editingId = null;
    document.getElementById("srcTag").innerHTML = "";
    document.getElementById("delBtn").style.display = "none";
    document.getElementById("saveBtn").style.display = "";
    if (evt) {
      document.getElementById("modalTitle").textContent = isSynced(evt) ? "Synced event" : "Edit event";
      document.getElementById("fTitle").value = evt.title;
      document.getElementById("fDate").value = evt.date;
      document.getElementById("fTime").value = evt.time || "";
      document.getElementById("fCat").value = evt.category || "personal";
      document.getElementById("fNotes").value = evt.notes || "";
      if (isSynced(evt)) {
        document.getElementById("srcTag").innerHTML =
          `<span class="src-tag">🔄 Auto-synced from ${evt.source}</span>`;
        document.getElementById("saveBtn").style.display = "none";
      } else {
        editingId = evt.id;
        document.getElementById("delBtn").style.display = "";
      }
    } else {
      document.getElementById("modalTitle").textContent = "Add event";
      document.getElementById("fTitle").value = "";
      document.getElementById("fDate").value = dateKey;
      document.getElementById("fTime").value = "";
      document.getElementById("fCat").value = "personal";
      document.getElementById("fNotes").value = "";
    }
    overlay.classList.add("open");
    document.getElementById("fTitle").focus();
  }
  function closeModal() { overlay.classList.remove("open"); }

  document.getElementById("cancelBtn").onclick = closeModal;
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };

  document.getElementById("saveBtn").onclick = async () => {
    const title = document.getElementById("fTitle").value.trim();
    const date = document.getElementById("fDate").value;
    if (!title || !date) return;
    const data = {
      id: editingId || ("m" + Date.now()),
      title, date,
      time: document.getElementById("fTime").value || null,
      category: document.getElementById("fCat").value,
      source: null,
      notes: document.getElementById("fNotes").value.trim() || null
    };
    closeModal();
    status("Saving…", true);
    try {
      if (editingId) {
        await sb("events?id=eq." + encodeURIComponent(editingId), { method: "PATCH", body: JSON.stringify(data) });
        events = events.map(e => e.id === editingId ? data : e);
      } else {
        await sb("events", { method: "POST", body: JSON.stringify(data) });
        events.push(data);
      }
      status("Saved ✓");
    } catch (e) { status("Save failed — check your connection", true); }
    render();
  };

  document.getElementById("delBtn").onclick = async () => {
    const id = editingId;
    closeModal();
    status("Deleting…", true);
    try {
      await sb("events?id=eq." + encodeURIComponent(id), { method: "DELETE" });
      events = events.filter(e => e.id !== id);
      status("Deleted ✓");
    } catch (e) { status("Delete failed — check your connection", true); }
    render();
  };

  document.getElementById("prevBtn").onclick = () => { view.setMonth(view.getMonth() - 1); render(); };
  document.getElementById("nextBtn").onclick = () => { view.setMonth(view.getMonth() + 1); render(); };
  document.getElementById("todayBtn").onclick = () => { view = new Date(); view.setDate(1); render(); };

  render();   // draw immediately (holidays + frame)
  load();     // then fill with cloud data

  // kiosk mode: refresh data every 15 min; full reload nightly to pick up design updates
  setInterval(load, 15 * 60 * 1000);
  setInterval(() => { const h = new Date().getHours(); if (h === 4) location.reload(); }, 55 * 60 * 1000);
})();
</script>
</body>
</html>
